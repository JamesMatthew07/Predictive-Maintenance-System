                    - heading "Who We Are" [level=2] [ref=e75]
                    - generic [ref=e76]:
                      - generic [ref=e79]:
                        - paragraph [ref=e80]: "Bridgewater Interiors was founded in 1998 as a joint venture between Epsilon Technologies, a Detroit based entrepreneurial partnership, and publicly traded Johnson Controls, Inc. (NYSE: JCI) to manufacture automotive seating systems for General Motors Corporation."
                        - paragraph [ref=e81]: President and CEO Ronald E. Hall, Sr. was identified to lead the organization after a long and successful career in corporate management, entrepreneurship, and economic development, including a distinguished tenure heading the Michigan Minority Supplier Development Council.
                      - generic [ref=e84]:
                        - paragraph [ref=e85]: Bridgewater quickly established relevance in the automotive supplier space, as its initial five-year GM contract was the largest contract ever awarded to a racial minority-owned business by an automaker.
                        - paragraph [ref=e86]: "Today, the company is a joint venture between Epsilon and publicly traded Adient plc (NYSE: ADNT) and has expanded from one Detroit location with 133 employees to four facilities in two U.S. states with 2,400 employees. Its customer list, meanwhile, has expanded from one automaker to four, including GM, Honda Manufacturing of America, Ford Motor Company, and Fiat Chrysler Automobiles – supporting 11 different vehicle models."
