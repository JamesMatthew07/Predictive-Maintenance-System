                  - generic [ref=e338]:
                    - heading "Vision" [level=2] [ref=e343]
                    - paragraph [ref=e348]: Bridgewater provides customer-focused automotive interiors manufacturing services at industry-leading standards and performance levels that fulfill the ideals of Minority Business Enterprise leadership. The company heeds the responsibility of good corporate citizenship, dedicated community involvement and commitment to inclusion and diversity in its supplier base and employee ranks.
                  - generic [ref=e349]:
                    - generic [ref=e350]:
                      - generic [ref=e351]:
                        - heading "Our History" [level=2] [ref=e354]
                        - paragraph [ref=e357]:
                          - strong [ref=e358]: 1998-2003
                          - text: ": Thirty years into the supplier diversity movement that it started in the automotive industry, General Motors contracts with newly formed Bridgewater Interiors to manufacture seating for one of its leading programs. Johnson Controls, which would proceed to preeminence in the supplier diversity space among Tier 1 automotive firms, commits to partnership in the joint venture. A new, state-of-the-art production facility is developed in southwest Detroit – the first such development in decades – and Bridgewater immediately becomes one of the largest minority-owned companies in the nation."
